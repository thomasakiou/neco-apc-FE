<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NECO APCIC</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#43a047", // Leaf Green
            "primary-hover": "#2e7d32",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
            surface: "#ffffff",
            success: "#28A745",
            warning: "#FFC107",
            danger: "#DC3545",
            info: "#17A2B8",
            slate: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#94a3b8',
              400: '#64748b',
              500: '#475569',
              600: '#334155',
              700: '#1e293b',
              800: '#0f172a',
              900: '#020617',
              950: '#000000',
            },
          },
          fontFamily: {
            display: ["Public Sans", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .material-symbols-outlined.fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      font-family: 'Public Sans', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.2);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.4);
    }

    .workspace-grid {
      display: grid;
      grid-template-columns: 1fr;
      height: auto;
      min-height: calc(100vh - 80px);
    }

    @media (min-width: 1024px) {
      .workspace-grid {
        grid-template-columns: 340px 1fr;
        height: calc(100vh - 80px);
      }
    }

    @keyframes point-hand {

      0%,
      100% {
        transform: translateX(0) rotate(90deg);
        opacity: 0.7;
      }

      50% {
        transform: translateX(8px) rotate(90deg);
        opacity: 1;
      }
    }

    .animate-point {
      animation: point-hand 1.2s ease-in-out infinite;
    }

    .pick-station-btn {
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pick-station-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.10.1"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
  <link rel="icon" type="image/png" href="/images/neco.png" />
</head>

<body class="bg-background-light text-slate-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
